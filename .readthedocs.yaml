# .readthedocs.yaml
# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

version: 2

# Set the version of Python and other tools
build:
  os: ubuntu-24.04
  tools:
    python: "3.14" # Or your preferred Python version, e.g., "3.12"
  jobs:
    pre_install:
      - curl -LsSf https://astral.sh/uv/install.sh | sh
      - source $HOME/.local/bin/env
      - cd src/main/webapp/plugins/rdfexport
    install:
      - uv sync --group docs
    pre_build:
      - uv run python rdfexport/docs/scripts/build_docs.py

# Build documentation in the docs/ directory with Sphinx
sphinx:
  configuration: rdfexport/docs/source/conf.py # Path to your Sphinx conf.py
  builder: html
  fail_on_warning: false # Set to true if you want builds to fail on warnings

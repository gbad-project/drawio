# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

# Originally generated with Claude Opus 4.5 on 2025-12-06, modified

version: 2

build:
  os: ubuntu-24.04
  tools:
    # We need a base tool to enable build.jobs - using python as placeholder
    # since asdf will manage our actual tools
    python: "3.14"
  jobs:
    post_checkout:
      # Remove existing asdf and install pinned version
      - rm -rf ~/.asdf
      - git clone https://github.com/asdf-vm/asdf.git ~/.asdf --branch v0.18.0
      - export ASDF_DIR="$HOME/.asdf" && . ~/.asdf/asdf.sh && asdf --version

    pre_install:
      # Change to the subdirectory where .tool-versions lives
      - cd src/main/webapp/plugins/rdfexport && cat .tool-versions

      # Add asdf plugins for uv and bun
      - export ASDF_DIR="$HOME/.asdf" && . ~/.asdf/asdf.sh && asdf plugin add uv
      - export ASDF_DIR="$HOME/.asdf" && . ~/.asdf/asdf.sh && asdf plugin add bun

      # Install versions specified in .tool-versions
      - export ASDF_DIR="$HOME/.asdf" && . ~/.asdf/asdf.sh && cd src/main/webapp/plugins/rdfexport && asdf install uv
      - export ASDF_DIR="$HOME/.asdf" && . ~/.asdf/asdf.sh && cd src/main/webapp/plugins/rdfexport && asdf install bun

    install:
      # Install dependencies using uv from the subdirectory
      - export ASDF_DIR="$HOME/.asdf" && . ~/.asdf/asdf.sh && cd src/main/webapp/plugins/rdfexport && uv sync --group docs

    build:
      html:
        # Run the docs build command from the subdirectory
        - export ASDF_DIR="$HOME/.asdf" && . ~/.asdf/asdf.sh && cd src/main/webapp/plugins/rdfexport && bun run build:docs
        # Copy built docs to Read the Docs output directory
        # Adjust the source path if your build outputs elsewhere
        - mkdir -p $READTHEDOCS_OUTPUT/html/
        - cp -r src/main/webapp/plugins/rdfexport/docs/build/html/* $READTHEDOCS_OUTPUT/html/

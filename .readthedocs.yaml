# .readthedocs.yaml
# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

version: 2

# Set the version of Python and other tools
build:
  os: ubuntu-24.04
  tools:
    python: "3.14" # Or your preferred Python version, e.g., "3.12"
  jobs:
    pre_create_environment:
      - asdf plugin add uv
      - asdf install uv latest
      - asdf global uv latest
    create_environment:
      - uv venv "${READTHEDOCS_VIRTUALENV_PATH}"
    install:
      - UV_PROJECT_ENVIRONMENT="${READTHEDOCS_VIRTUALENV_PATH}" uv sync --frozen --group docs
    pre_build:
      - cd src/main/webapp/plugins/rdfexport
      - uv run python rdfexport/docs/scripts/build_docs.py

# Build documentation in the docs/ directory with Sphinx
sphinx:
  configuration: rdfexport/docs/source/conf.py # Path to your Sphinx conf.py
  builder: html
  fail_on_warning: false # Set to true if you want builds to fail on warnings

metadata:
  attributes:
    csvPath: null
    baseUri: null
  preamble: []
    # - prefix:
    #   iri:
parser_config:
  ontology_iri: null
  infer_type_of_literals: true
  include_preamble: true
  prefix: null
  prefix_iri: null
  indentation: 2
  include_label: true
  max_gap: 10
  strict_mode: false
  strip_html: false
  mint_from_literals: true
  mint_from_types: false
  mint_from_arrows: true
  metacharacter_substitute:
    - "url" # OR:
    # - character:   " "
    #   replacement: %20
    # - character:   "("
    #   replacement: ""
  literal_definitions:
    - attr_key:   style
      attr_value: rounded=1
    # - attr_key:   someattr
    #   attr_value: someval
  capitalisation_scheme: upper-camel
  rml_enabled: null
